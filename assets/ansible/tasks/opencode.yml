---
- name: Check whether Open Code is installed
  ansible.builtin.shell: 'command -v opencode || test -x "$HOME/.local/bin/opencode" || test -x "$HOME/.opencode/bin/opencode"'
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  register: opencode_check
  failed_when: false
  changed_when: false

- name: Install Open Code (official installer)
  ansible.builtin.shell: curl -fsSL https://opencode.ai/install | bash
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  when: opencode_check.rc != 0 or (upgrade | bool)
