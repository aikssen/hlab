---
- name: Check whether Claude Code is installed
  ansible.builtin.shell: 'command -v claude || test -x "$HOME/.local/bin/claude"'
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  register: claude_check
  failed_when: false
  changed_when: false

- name: Install Claude Code (official installer)
  ansible.builtin.shell: curl -fsSL https://claude.ai/install.sh | bash
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ target_user }}"
  when: claude_check.rc != 0 or (upgrade | bool)
