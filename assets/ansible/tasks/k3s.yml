---
- name: Check whether K3s is installed
  ansible.builtin.command: k3s --version
  register: k3s_check
  failed_when: false
  changed_when: false

- name: Install K3s via the official script
  ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s
  when: k3s_check.rc != 0
